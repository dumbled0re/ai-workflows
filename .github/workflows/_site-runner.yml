name: _site-runner

# Reusable workflow shared by every per-site yml (moppy.yml,
# pointincome.yml, etc). All site-specific knobs come in via ``inputs``
# / ``secrets``; the per-site caller is then small (just a cron line +
# dispatch inputs + secret routing).
#
# Cache key prefix is ``<site>-state-`` so each site's data is isolated
# even though they share the same cache namespace. Concurrency group is
# also per-site so one site's stuck run doesn't block the others.

on:
  workflow_call:
    inputs:
      site:
        description: "adapter name passed to --site (must exist in REGISTRY)"
        type: string
        required: true
      dry_run:
        type: boolean
        default: false
      extract_links:
        type: boolean
        default: false
      discover:
        type: boolean
        default: false
      inspect_url:
        type: string
        default: ""
      inspect_browser:
        description: "render inspect_url via Playwright Chromium so JS-driven content is visible"
        type: boolean
        default: false
      inspect_cap:
        description: "max stripped-body bytes to print (default 80000); pass as string for cross-workflow compat"
        type: string
        default: "80000"
      inspect_wait_selector:
        description: "browser mode only: wait for this CSS selector before reading page.content(). For fully-SPA sites where server-side HTML is a shell."
        type: string
        default: ""
      inspect_anonymous:
        description: "skip cookie loading and login verification (for inspecting login forms / anonymous landing pages)"
        type: boolean
        default: false
      force_fresh_cookies:
        description: "delete persisted cookie jar before run, forcing re-bootstrap from <SITE>_COOKIES Secret. Use after rotating the Secret in GitHub when the cached jar would otherwise overwrite the fresh value."
        type: boolean
        default: false
      force_password_login_test:
        description: "DEBUG: skip cookie verify and exercise password_login fallback directly (verify <SITE>_USER/PASS wiring)"
        type: boolean
        default: false
    secrets:
      slack_bot_token:
        required: true
      slack_channel:
        required: true
      cookies:
        required: false
      gmail_user:
        required: true
      gmail_app_password:
        required: true
      # Optional ID/PW fallback. When both are provided AND the
      # adapter has ``password_login`` configured, ``_verify_login``
      # falls back to fresh Playwright login if cookies fail.
      login_user:
        required: false
      login_pass:
        required: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: site-${{ inputs.site }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: point_sites
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen

      - name: Cache Playwright browsers
        # Chromium is ~150MB. Caching by uv.lock so a playwright bump
        # invalidates and re-downloads, but day-to-day runs hit the cache.
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('point_sites/uv.lock') }}

      - name: Install Playwright Chromium
        # Required for adapters that opt into BrowserClicker (pointincome
        # balance scraping, amefri SPA gacha, etc). Adapters that only
        # use Clicker still pay the install cost but it's bounded by the
        # cache above and runs sub-10s on a hit.
        run: uv run playwright install chromium

      - name: Bridge pre-rename cache (one-time)
        # Cache version is hashed from the cache ``path`` string, so the
        # rename moppy_clicker/data/ → point_sites/data/ orphaned the
        # old cache (the path differs → version differs → restore
        # misses even though the key prefix matches). The OLD workflow
        # saved with the multi-line path list shown below; we have to
        # mirror that exactly here for the version hash to match and
        # for the archive to actually extract. Once the new-layout
        # cache exists this step finds nothing and is a no-op.
        if: inputs.site == 'moppy'
        uses: actions/cache/restore@v4
        with:
          path: moppy_clicker/data/
          key: legacy-bridge-${{ github.run_id }}
          restore-keys: |
            ${{ inputs.site }}-state-
        continue-on-error: true

      - name: Apply legacy cache bridge
        # IMPORTANT: this step runs from the parent ``working-directory:
        # point_sites`` so all paths must be qualified with
        # $GITHUB_WORKSPACE — otherwise ``moppy_clicker/data/`` is
        # interpreted as ``point_sites/moppy_clicker/data/`` (which
        # doesn't exist) and the bridge silently no-ops.
        if: inputs.site == 'moppy'
        run: |
          set -e
          LEGACY="$GITHUB_WORKSPACE/moppy_clicker/data"
          NEW="$GITHUB_WORKSPACE/point_sites/data"
          if [ -d "$LEGACY" ] && [ -n "$(ls -A "$LEGACY" 2>/dev/null)" ]; then
            echo "bridging $LEGACY → $NEW"
            mkdir -p "$NEW"
            cp -r "$LEGACY"/. "$NEW"/
            ls -la "$NEW"
          else
            echo "no legacy data to bridge ($LEGACY missing or empty)"
          fi

      - name: Restore state cache
        # actions/cache survives across workflow runs (unlike artifacts),
        # so the rotated cookie jar from yesterday's run is what we boot
        # from today. Per-site key prefix keeps adapters isolated.
        # Runs after the bridge so a fresh new-layout cache wins over
        # the legacy one (most recent state always preferred).
        uses: actions/cache/restore@v4
        with:
          path: point_sites/data/
          key: ${{ inputs.site }}-state-${{ github.run_id }}
          restore-keys: |
            ${{ inputs.site }}-state-

      - name: Force fresh cookie bootstrap
        # When the user rotates the <SITE>_COOKIES Secret in GitHub but
        # the previously-persisted ``cookies.json`` is still in the
        # actions cache, ``_resolve_cookies`` would prefer the stale
        # persisted jar and ignore the fresh Secret — wedging the run
        # in stale-cookie mode until cache is manually purged. This
        # opt-in input deletes the persisted jar so the next run
        # bootstraps from the Secret. State.json is preserved (only
        # cookies are fresh-bootstrapped).
        if: inputs.force_fresh_cookies
        run: |
          set -e
          JAR="$GITHUB_WORKSPACE/point_sites/data/${{ inputs.site }}/cookies.json"
          if [ -f "$JAR" ]; then
            echo "force_fresh_cookies=true → removing $JAR"
            rm -f "$JAR"
          else
            echo "no persisted jar at $JAR (already fresh)"
          fi

      - name: Run
        env:
          SITE: ${{ inputs.site }}
          DRY_RUN_FLAG: ${{ inputs.dry_run && '1' || '0' }}
          # Cron always runs in click (credited) mode. Use
          # ``workflow_dispatch -f extract_links=true`` for one-off
          # read-only runs while shaking down a new adapter.
          DISPATCH_EXTRACT: ${{ inputs.extract_links && '1' || '0' }}
          INSPECT_URL: ${{ inputs.inspect_url }}
          INSPECT_BROWSER: ${{ inputs.inspect_browser && '1' || '0' }}
          INSPECT_CAP: ${{ inputs.inspect_cap }}
          INSPECT_WAIT_SELECTOR: ${{ inputs.inspect_wait_selector }}
          INSPECT_ANONYMOUS: ${{ inputs.inspect_anonymous && '1' || '0' }}
          DISCOVER: ${{ inputs.discover && '1' || '0' }}
          SLACK_BOT_TOKEN: ${{ secrets.slack_bot_token }}
          SITE_SLACK_CHANNEL: ${{ secrets.slack_channel }}
          SITE_COOKIES: ${{ secrets.cookies }}
          SITE_LOGIN_USER: ${{ secrets.login_user }}
          SITE_LOGIN_PASS: ${{ secrets.login_pass }}
          FORCE_PASSWORD_LOGIN_TEST: ${{ inputs.force_password_login_test && '1' || '' }}
          GMAIL_USER: ${{ secrets.gmail_user }}
          GMAIL_APP_PASSWORD: ${{ secrets.gmail_app_password }}
        run: |
          set -e
          SITE_UPPER=$(echo "$SITE" | tr '[:lower:]' '[:upper:]')
          # Map per-site secrets to the env-var names the Python config
          # expects (MOPPY_COOKIES / SLACK_CHANNEL_MOPPY / etc).
          export "${SITE_UPPER}_COOKIES=$SITE_COOKIES"
          export "SLACK_CHANNEL_${SITE_UPPER}=$SITE_SLACK_CHANNEL"
          export "${SITE_UPPER}_DRY_RUN=$DRY_RUN_FLAG"
          # Optional ID/PW fallback. ``<SITE>_USER`` / ``<SITE>_PASS`` are
          # consumed by point_sites/common/password_login.py only when the
          # adapter has ``password_login`` set AND cookie verification fails.
          # Empty values are exported as empty strings; password_login.py
          # checks ``os.environ.get(...)`` (truthy) so empty == not set.
          export "${SITE_UPPER}_USER=$SITE_LOGIN_USER"
          export "${SITE_UPPER}_PASS=$SITE_LOGIN_PASS"
          if [[ "$DISPATCH_EXTRACT" == "1" ]]; then
            export "${SITE_UPPER}_EXTRACT_LINKS=1"
          fi
          # inspect_url and discover are dispatch-only debug paths and
          # override the click pipeline. inspect_url has highest priority.
          if [[ -n "$INSPECT_URL" ]]; then
            HTML_FLAGS=()
            if [[ "$INSPECT_BROWSER" == "1" ]]; then
              HTML_FLAGS+=(--browser)
            fi
            if [[ -n "$INSPECT_CAP" && "$INSPECT_CAP" != "80000" ]]; then
              HTML_FLAGS+=(--cap "$INSPECT_CAP")
            fi
            if [[ -n "$INSPECT_WAIT_SELECTOR" ]]; then
              HTML_FLAGS+=(--wait-selector "$INSPECT_WAIT_SELECTOR")
            fi
            if [[ "$INSPECT_ANONYMOUS" == "1" ]]; then
              HTML_FLAGS+=(--anonymous)
            fi
            uv run python -m point_sites.main html --site "$SITE" "$INSPECT_URL" "${HTML_FLAGS[@]}"
          elif [[ "$DISCOVER" == "1" ]]; then
            uv run python -m point_sites.main discover --site "$SITE"
          else
            uv run python -m point_sites.main run --site "$SITE"
          fi

      - name: Save state cache
        # always() so a failed click step still preserves whatever
        # rotated cookies we managed to capture before the failure.
        if: always()
        uses: actions/cache/save@v4
        with:
          path: point_sites/data/
          key: ${{ inputs.site }}-state-${{ github.run_id }}
