name: hapitas

# ハピタス click-mail automation. Cron offset 30 min after moppy.yml so
# the two sites' traffic is staggered. Click URLs are valid 7 days
# from receipt so we use newer_than:7d in the gmail query (vs 3d for
# Moppy/pointincome) — gives plenty of margin for daily cadence.
#
# 2FA caveat: if the user has TOTP enabled on ハピタス this cookie-only
# flow will fail. The default is 2FA off; if it's on, either disable
# it or skip enabling this adapter.

on:
  # schedule disabled 2026-05-17 — Gmail account suspended, Zoho 移行待ち
  # schedule:
  #   - cron: "30 23 * * *"  # JST 8:30
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false
      extract_links:
        type: boolean
        default: false
      discover:
        type: boolean
        default: false
      inspect_url:
        type: string
        default: ""
      inspect_browser:
        description: "render inspect_url via Playwright Chromium so JS-driven content is visible"
        type: boolean
        default: false
      inspect_cap:
        description: "max stripped-body bytes to print (default 80000)"
        type: string
        default: "80000"
      inspect_wait_selector:
        description: "browser mode only: wait for this CSS selector before reading page.content()"
        type: string
        default: ""
      inspect_anonymous:
        description: "skip cookie loading and login verification (login form inspect)"
        type: boolean
        default: false
      inspect_capture_network:
        description: "browser mode only: log all network requests (for SPA API discovery)"
        type: boolean
        default: false
      force_fresh_cookies:
        description: "delete persisted cookie jar before run, forcing re-bootstrap from Secret"
        type: boolean
        default: false
      force_password_login_test:
        description: "DEBUG: skip cookie verify, exercise password_login fallback directly"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  run:
    uses: ./.github/workflows/_site-runner.yml
    with:
      site: hapitas
      dry_run: ${{ inputs.dry_run == true }}
      extract_links: ${{ inputs.extract_links == true }}
      discover: ${{ inputs.discover == true }}
      inspect_url: ${{ inputs.inspect_url }}
      inspect_browser: ${{ inputs.inspect_browser == true }}
      inspect_cap: ${{ inputs.inspect_cap }}
      inspect_wait_selector: ${{ inputs.inspect_wait_selector }}
      inspect_anonymous: ${{ inputs.inspect_anonymous == true }}
      inspect_capture_network: ${{ inputs.inspect_capture_network == true }}
      force_fresh_cookies: ${{ inputs.force_fresh_cookies == true }}
      force_password_login_test: ${{ inputs.force_password_login_test == true }}
    secrets:
      slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_HAPITAS }}
      cookies: ${{ secrets.HAPITAS_COOKIES }}
      gmail_user: ${{ secrets.GMAIL_USER }}
      gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
      login_user: ${{ secrets.HAPITAS_USER }}
      login_pass: ${{ secrets.HAPITAS_PASS }}
