name: pointtown

# ポイントタウン onsite-inbox click-coin automation. Daily cron at JST
# 9:30 AM (offset from amefuri 9:15 / gendama 9:00 / chobirich 8:45 etc).
# Cron always runs in click (credited) mode; for one-off shake-down
# of new parser changes use ``gh workflow run pointtown.yml -f
# extract_links=true`` to surface URLs in Slack instead of clicking.

on:
  schedule:
    # Twice-daily cron to keep the session alive — pointtown cookies
    # observed to expire in ~20h (GMO anti-fraud session policy). The
    # 9:30 run does the actual click work; the 21:30 run is a session-
    # keepalive (verify_login + balance scrape only; state-store dedup
    # prevents any double-click).
    - cron: "30 0 * * *"   # JST 9:30 (primary click run)
    - cron: "30 12 * * *"  # JST 21:30 (session keepalive)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "extract candidates only, redacted"
        type: boolean
        default: false
      extract_links:
        description: "post full clickable URLs to Slack instead of clicking"
        type: boolean
        default: false
      discover:
        description: "read-only recon of mypage / mailbox (use to find real URL patterns)"
        type: boolean
        default: false
      inspect_url:
        description: "GET this URL with auth and dump body to log (use for /mypage/mail HTML inspection)"
        type: string
        default: ""
      inspect_browser:
        description: "render inspect_url via Playwright Chromium so JS-driven content is visible"
        type: boolean
        default: false
      inspect_cap:
        description: "max stripped-body bytes to print (default 80000)"
        type: string
        default: "80000"
      inspect_wait_selector:
        description: "browser mode only: wait for this CSS selector before reading page.content()"
        type: string
        default: ""
      inspect_anonymous:
        description: "skip cookie loading and login verification (login form inspect)"
        type: boolean
        default: false
      force_fresh_cookies:
        description: "delete persisted cookie jar before run, forcing re-bootstrap from Secret (use after rotating <SITE>_COOKIES)"
        type: boolean
        default: false


permissions:
  contents: read

jobs:
  run:
    uses: ./.github/workflows/_site-runner.yml
    with:
      site: pointtown
      dry_run: ${{ inputs.dry_run == true }}
      extract_links: ${{ inputs.extract_links == true }}
      discover: ${{ inputs.discover == true }}
      inspect_url: ${{ inputs.inspect_url }}
      inspect_browser: ${{ inputs.inspect_browser == true }}
      inspect_cap: ${{ inputs.inspect_cap }}
      inspect_wait_selector: ${{ inputs.inspect_wait_selector }}
      inspect_anonymous: ${{ inputs.inspect_anonymous == true }}
      force_fresh_cookies: ${{ inputs.force_fresh_cookies == true }}
    secrets:
      slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_POINTTOWN }}
      cookies: ${{ secrets.POINTTOWN_COOKIES }}
      gmail_user: ${{ secrets.GMAIL_USER }}
      gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
