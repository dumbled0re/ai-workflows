name: moppy-clicker

on:
  # While we wait for the user's existing 5000pt balance to be cashed out
  # (target: 2026-05-07), the cron runs in extract-links mode: it parses
  # incoming click-for-points emails and POSTS THE FULL URLS TO SLACK so
  # the user can click them manually in their already-logged-in browser.
  # No clicks happen from the workflow; no Gmail labels or state changes.
  #
  # After cashout: register MOPPY_COOKIES, set MOPPY_EXTRACT_LINKS=0 (or
  # remove the env var), and the same cron switches to credited auto-click.
  schedule:
    - cron: "0 23 * * *"  # JST 朝8時
  workflow_dispatch:
    inputs:
      dry_run:
        description: "extract candidates only, redacted (legacy)"
        type: boolean
        default: false
      extract_links:
        description: "post full clickable URLs to Slack instead of clicking (cron forces this on)"
        type: boolean
        default: false

concurrency:
  group: moppy-clicker
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: moppy_clicker
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen

      - name: Restore state artifact
        uses: actions/download-artifact@v4
        with:
          name: moppy-state
          path: moppy_clicker/data/
        continue-on-error: true

      - name: Run
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_MOPPY: ${{ secrets.SLACK_CHANNEL_MOPPY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MOPPY_COOKIES: ${{ secrets.MOPPY_COOKIES }}
          MOPPY_DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          # Mode selection priority:
          #   1. workflow_dispatch with extract_links=true → extract mode
          #   2. cron AND vars.MOPPY_CRON_MODE != 'click' → extract mode
          #   3. otherwise → click mode (will abort if MOPPY_COOKIES unset)
          # To flip cron from extract → credited auto-click after cashout:
          #   Settings → Variables → set MOPPY_CRON_MODE = 'click'
          # (also requires MOPPY_COOKIES secret to be registered).
          MOPPY_EXTRACT_LINKS: ${{ (inputs.extract_links || (github.event_name == 'schedule' && vars.MOPPY_CRON_MODE != 'click')) && '1' || '0' }}
        run: uv run python -m moppy_clicker.main run

      - name: Save state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moppy-state
          path: moppy_clicker/data/state.json
          retention-days: 30
          if-no-files-found: ignore
