name: getmoney

# GetMoney! (dietnavi.com) click-coin email automation. Daily cron at
# JST 9:45 AM — 15-min staggered after pointtown.yml so all five
# point-site runs are spread across 8:00〜9:45 JST and look less bot-y.
#
# Cron will fail fast (verify_login redirect → exit code 2) until both
# GETMONEY_COOKIES and SLACK_CHANNEL_GETMONEY are registered. After
# registration:
#   1. ``gh workflow run getmoney.yml -f discover=true`` で daily click
#      ページの構造を確認、adapter の URL を refine
#   2. 最初のクリックメールが届いた朝に dry_run=true で extraction
#      動作を検証 → 問題なければ cron 任せ

on:
  schedule:
    # Twice-daily cron to keep the session alive — dietnavi (getmoney)
    # cookies observed to expire in ~20h (株式会社インフォニア系の session
    # policy)。The 9:45 run does the actual click work; the 21:45 run is
    # a session-keepalive (verify_login + balance scrape only; state-
    # store dedup prevents any double-click).
    - cron: "45 0 * * *"   # JST 9:45 (primary click run, 15 min after pointtown.yml)
    - cron: "45 12 * * *"  # JST 21:45 (session keepalive)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "extract candidates only, redacted"
        type: boolean
        default: false
      extract_links:
        description: "post full clickable URLs to Slack instead of clicking"
        type: boolean
        default: false
      discover:
        description: "read-only recon of 毎日貯める section"
        type: boolean
        default: false
      inspect_url:
        description: "GET this URL with auth and dump body to log"
        type: string
        default: ""
      inspect_browser:
        description: "render inspect_url via Playwright Chromium so JS-driven content is visible"
        type: boolean
        default: false
      inspect_cap:
        description: "max stripped-body bytes to print (default 80000)"
        type: string
        default: "80000"
      inspect_wait_selector:
        description: "browser mode only: wait for this CSS selector before reading page.content()"
        type: string
        default: ""
      inspect_anonymous:
        description: "skip cookie loading and login verification (login form inspect)"
        type: boolean
        default: false
      force_fresh_cookies:
        description: "delete persisted cookie jar before run, forcing re-bootstrap from Secret (use after rotating <SITE>_COOKIES)"
        type: boolean
        default: false
      force_password_login_test:
        description: "DEBUG: skip cookie verify, exercise password_login fallback directly"
        type: boolean
        default: false


permissions:
  contents: read

jobs:
  run:
    uses: ./.github/workflows/_site-runner.yml
    with:
      site: getmoney
      dry_run: ${{ inputs.dry_run == true }}
      extract_links: ${{ inputs.extract_links == true }}
      discover: ${{ inputs.discover == true }}
      inspect_url: ${{ inputs.inspect_url }}
      inspect_browser: ${{ inputs.inspect_browser == true }}
      inspect_cap: ${{ inputs.inspect_cap }}
      inspect_wait_selector: ${{ inputs.inspect_wait_selector }}
      inspect_anonymous: ${{ inputs.inspect_anonymous == true }}
      force_fresh_cookies: ${{ inputs.force_fresh_cookies == true }}
      force_password_login_test: ${{ inputs.force_password_login_test == true }}
    secrets:
      slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_GETMONEY }}
      cookies: ${{ secrets.GETMONEY_COOKIES }}
      gmail_user: ${{ secrets.GMAIL_USER }}
      gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
      login_user: ${{ secrets.GETMONEY_USER }}
      login_pass: ${{ secrets.GETMONEY_PASS }}
