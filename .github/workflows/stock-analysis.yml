name: Japanese Stock Analysis

on:
  schedule:
    # Morning: 8:00 JST = 23:00 UTC (previous day)
    - cron: '0 23 * * 0-4'
    # Evening: 16:00 JST = 07:00 UTC
    - cron: '0 7 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Phase 1: Fetch stock data & compute indicators → save prompts to data/
      - name: Prepare analysis data
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m src.main prepare

      # Phase 2: Claude Code Action reads prompts and generates analysis
      - name: Analyze with Claude AI (Holdings)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            data/analysis_input.json を読んで、"holdings_prompt" の内容に基づき株式分析を行ってください。
            "system_prompt" の指示に従って分析してください。

            結果は指定されたJSON形式のみを data/holdings_result.json に書き込んでください。
            JSONのみを出力し、他のテキストは含めないでください。
          additional_permissions: "Read,Write,Bash"

      - name: Analyze with Claude AI (Discovery)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            data/analysis_input.json を読んで、"discovery_prompt" の内容に基づき有望銘柄を選定してください。
            "system_prompt" の指示に従って分析してください。

            結果は指定されたJSON形式のみを data/discovery_result.json に書き込んでください。
            JSONのみを出力し、他のテキストは含めないでください。
          additional_permissions: "Read,Write,Bash"

      # Phase 3: Send results to Slack
      - name: Send results to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m src.main notify
