name: Japanese Stock Analysis

on:
  schedule:
    # Morning: 8:00 JST = 23:00 UTC (previous day)
    - cron: '0 23 * * 0-4'
    # Evening: 16:00 JST = 07:00 UTC
    - cron: '0 7 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: stock_analyzer
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen

      # Phase 1: Fetch stock data & compute indicators → save prompts to data/
      - name: Prepare analysis data
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_STOCK: ${{ secrets.SLACK_CHANNEL_STOCK }}
        run: uv run python -m stock_analyzer.main prepare

      # Phase 2: Claude Code Action reads prompts and generates analysis
      - name: Analyze with Claude AI (Holdings)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Read,Write,Edit,Bash"'
          prompt: |
            まず stock_analyzer/data/investment_rules.json を読んで投資ルールを把握してください。
            次に stock_analyzer/data/analysis_input.json を読んで、"holdings_prompt" の内容に基づき株式分析を行ってください。
            "system_prompt" の指示と investment_rules の両方に従って分析してください。

            結果は指定されたJSON形式のみを stock_analyzer/data/holdings_result.json に書き込んでください。
            JSONのみを出力し、他のテキストは含めないでください。

      - name: Analyze with Claude AI (Discovery)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Read,Write,Edit,Bash"'
          prompt: |
            まず stock_analyzer/data/investment_rules.json を読んで投資ルールを把握してください。
            次に stock_analyzer/data/analysis_input.json を読んで、"discovery_prompt" の内容に基づき有望銘柄を選定してください。
            "system_prompt" の指示と investment_rules の両方に従って分析してください。

            特に以下のルールを厳守すること:
            - entry_rules.avoid_entry の条件に該当する銘柄は推奨しない
            - market_regime_rules に従い、現在のレジームに適した銘柄のみ推奨する
            - confidence_calibration に従い、信頼度を適切に設定する

            結果は指定されたJSON形式のみを stock_analyzer/data/discovery_result.json に書き込んでください。
            JSONのみを出力し、他のテキストは含めないでください。

      # Phase 2.5: Build critic prompt from first-pass picks. Failure
      # here just produces no prompt file; the critic AI step then
      # writes no result and apply-critique becomes a no-op, so the
      # original picks flow unchanged to Slack.
      - name: Build critic prompt
        continue-on-error: true
        run: uv run python -m stock_analyzer.main critique

      # Phase 2.6: Independent critic — separate Claude Code Action so
      # the model sees only the final picks (no first-pass reasoning)
      # and applies the 5-item rubric without sycophancy anchor.
      - name: Critique picks with Claude AI
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Read,Write,Edit,Bash"'
          prompt: |
            stock_analyzer/data/critic_prompt.txt を読んで、その内容に従い
            各 pick を厳格に再評価してください。プロンプト内で指定された
            JSON 形式のみを stock_analyzer/data/critique_result.json に
            書き込んでください。JSON 以外のテキストや markdown フェンスは
            含めないでください。

      # Phase 2.7: Apply verdicts. Safe to skip if no critique was
      # produced (apply-critique itself is no-op without the file).
      - name: Apply critic verdicts
        continue-on-error: true
        run: uv run python -m stock_analyzer.main apply-critique

      # Phase 3: Send results to Slack & save predictions for tracking
      - name: Send results to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_STOCK: ${{ secrets.SLACK_CHANNEL_STOCK }}
        run: uv run python -m stock_analyzer.main notify

      # Phase 4: Evening strategy review (only on evening runs: 07:00 UTC = 16:00 JST)
      - name: Build strategy review prompt
        if: github.event.schedule == '0 7 * * 1-5' || github.event_name == 'workflow_dispatch'
        run: uv run python -m stock_analyzer.main review

      - name: Strategy review with Claude AI
        if: github.event.schedule == '0 7 * * 1-5' || github.event_name == 'workflow_dispatch'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Read,Write,Edit,Bash"'
          prompt: |
            stock_analyzer/data/review_prompt.txt を読んで、その内容に従い戦略レビューを行ってください。
            結果は指定されたJSON形式のみを stock_analyzer/data/review_result.json に書き込んでください。
            JSONのみを出力し、他のテキストは含めないでください。

      - name: Apply strategy review results
        if: github.event.schedule == '0 7 * * 1-5' || github.event_name == 'workflow_dispatch'
        run: uv run python -m stock_analyzer.main apply-review

      # Phase 5: Commit all tracking & strategy data back to repo
      - name: Save tracking and strategy data
        id: save_data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git add -f data/predictions_history.json data/strategy_notes.json data/screening_weights.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes to commit"
            echo "push_status=skipped" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update prediction tracking and strategy data [skip ci]"
            # Retry loop for push: if origin moved forward during the
            # cron (likely when the operator was pushing to master
            # during the same window), rebase our data commit on top
            # and try again. Up to 3 attempts before declaring failure.
            push_ok=false
            for attempt in 1 2 3; do
              if git push; then
                push_ok=true
                break
              fi
              echo "push attempt $attempt failed; rebasing on origin/master and retrying"
              git fetch origin master
              git rebase origin/master || git rebase --abort
              sleep 5
            done
            if $push_ok; then
              echo "push_status=success" >> "$GITHUB_OUTPUT"
            else
              echo "push_status=failed" >> "$GITHUB_OUTPUT"
              echo "::error::Git push failed after 3 attempts — tracking data will be lost!"
            fi
          fi

      - name: Notify push failure
        if: steps.save_data.outputs.push_status == 'failed'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_STOCK: ${{ secrets.SLACK_CHANNEL_STOCK }}
        run: uv run python -m stock_analyzer.main notify-save-failure
