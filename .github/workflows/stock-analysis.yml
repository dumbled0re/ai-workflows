name: Japanese Stock Analysis

on:
  schedule:
    # Morning: 8:00 JST = 23:00 UTC (previous day)
    - cron: '0 23 * * 0-4'
    # Evening: 16:00 JST = 07:00 UTC
    - cron: '0 7 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r stock_analyzer/requirements.txt

      # Phase 1: Fetch stock data & compute indicators → save prompts to data/
      - name: Prepare analysis data
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m stock_analyzer.main prepare

      # Phase 2: Claude Code Action reads prompts and generates analysis
      - name: Analyze with Claude AI (Holdings)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--allowedTools "Read,Write,Edit,Bash"'
          prompt: |
            まず stock_analyzer/data/investment_rules.json を読んで投資ルールを把握してください。
            次に stock_analyzer/data/analysis_input.json を読んで、"holdings_prompt" の内容に基づき株式分析を行ってください。
            "system_prompt" の指示と investment_rules の両方に従って分析してください。

            結果は指定されたJSON形式のみを stock_analyzer/data/holdings_result.json に書き込んでください。
            JSONのみを出力し、他のテキストは含めないでください。

      - name: Analyze with Claude AI (Discovery)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--allowedTools "Read,Write,Edit,Bash"'
          prompt: |
            まず stock_analyzer/data/investment_rules.json を読んで投資ルールを把握してください。
            次に stock_analyzer/data/analysis_input.json を読んで、"discovery_prompt" の内容に基づき有望銘柄を選定してください。
            "system_prompt" の指示と investment_rules の両方に従って分析してください。

            特に以下のルールを厳守すること:
            - entry_rules.avoid_entry の条件に該当する銘柄は推奨しない
            - market_regime_rules に従い、現在のレジームに適した銘柄のみ推奨する
            - confidence_calibration に従い、信頼度を適切に設定する

            結果は指定されたJSON形式のみを stock_analyzer/data/discovery_result.json に書き込んでください。
            JSONのみを出力し、他のテキストは含めないでください。

      # Phase 3: Send results to Slack & save predictions for tracking
      - name: Send results to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m stock_analyzer.main notify

      # Phase 4: Evening strategy review (only on evening runs: 07:00 UTC = 16:00 JST)
      - name: Build strategy review prompt
        if: github.event.schedule == '0 7 * * 1-5' || github.event_name == 'workflow_dispatch'
        run: python -m stock_analyzer.main review

      - name: Strategy review with Claude AI
        if: github.event.schedule == '0 7 * * 1-5' || github.event_name == 'workflow_dispatch'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--allowedTools "Read,Write,Edit,Bash"'
          prompt: |
            stock_analyzer/data/review_prompt.txt を読んで、その内容に従い戦略レビューを行ってください。
            結果は指定されたJSON形式のみを stock_analyzer/data/review_result.json に書き込んでください。
            JSONのみを出力し、他のテキストは含めないでください。

      - name: Apply strategy review results
        if: github.event.schedule == '0 7 * * 1-5' || github.event_name == 'workflow_dispatch'
        run: python -m stock_analyzer.main apply-review

      # Phase 5: Commit all tracking & strategy data back to repo
      - name: Save tracking and strategy data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f stock_analyzer/data/predictions_history.json stock_analyzer/data/strategy_notes.json stock_analyzer/data/screening_weights.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update prediction tracking and strategy data [skip ci]"
          git push || true
