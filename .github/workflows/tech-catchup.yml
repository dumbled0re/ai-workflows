name: AI Tech Catchup

on:
  schedule:
    # 7:30 JST daily (22:30 UTC the previous day). Lookback is 24 hours
    # so the morning digest catches everything that landed during the
    # previous calendar day, including overnight US-time releases from
    # Anthropic / OpenAI / Google. phase_gather drops a skip.flag if
    # truly nothing happened and the AI / Slack steps short-circuit.
    - cron: '30 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  catchup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: tech_catchup
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen

      # Phase 1: Focused gather — Claude Code / Codex / Gemini CLI updates
      # + AI buzz (HN high-engagement / GitHub Trending / X via RSSHub).
      # Writes data/skip.flag if nothing new — the AI + Slack steps gate
      # on its absence so a quiet hour doesn't spam an empty digest.
      - name: Gather focused tech updates
        run: uv run python -m tech_catchup.main gather

      - name: Check whether anything to summarise
        id: check
        run: |
          if [ -f data/skip.flag ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No updates this run — skipping AI + Slack steps"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Phase 2: Claude summarises only when there's content
      - name: Analyze with Claude AI
        if: steps.check.outputs.skip == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Read,Write,Edit,Bash"'
          prompt: |
            tech_catchup/data/tech_catchup_prompt.txt を読んで、その内容に従い
            Claude Code / OpenAI Codex / Gemini CLI の更新と AI 業界バズを整理してください。
            結果は指定された JSON 形式のみを tech_catchup/data/tech_catchup_result.json に書き込んでください。
            JSON 以外のテキスト (markdown fence 含む) は出力しないでください。

      # Phase 3: Send to Slack only when AI ran
      - name: Send to Slack
        if: steps.check.outputs.skip == 'false'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_TECH: ${{ secrets.SLACK_CHANNEL_TECH }}
        run: uv run python -m tech_catchup.main notify
