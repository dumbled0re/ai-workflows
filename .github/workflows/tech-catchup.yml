name: AI Tech Catchup

on:
  schedule:
    # Every morning 7:30 JST = 22:30 UTC (previous day)
    - cron: '30 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  catchup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: tech_catchup
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen

      # Phase 1: Gather AI news from multiple sources
      - name: Gather AI news
        run: uv run python -m tech_catchup.main gather

      # Phase 2: Claude summarizes and prioritizes
      - name: Analyze with Claude AI
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Read,Write,Edit,Bash"'
          prompt: |
            tech_catchup/data/tech_catchup_prompt.txt を読んで、その内容に従いAI技術動向を整理・要約してください。
            結果は指定されたJSON形式のみを tech_catchup/data/tech_catchup_result.json に書き込んでください。
            JSONのみを出力し、他のテキストは含めないでください。

      # Phase 3: Send to Slack
      - name: Send to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_TECH: ${{ secrets.SLACK_CHANNEL_TECH }}
        run: uv run python -m tech_catchup.main notify
