name: Weekly Strategy Review

on:
  schedule:
    # Every Saturday 10:00 JST = 01:00 UTC Saturday
    - cron: '0 1 * * 6'
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Phase 1: Build review prompt from prediction history
      - name: Prepare review data
        run: python -m src.main review

      # Phase 2: Claude analyzes past performance and generates strategy updates
      - name: Strategy review with Claude AI
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Read,Write,Edit,Bash"'
          prompt: |
            data/review_prompt.txt を読んで、その内容に従い週次戦略レビューを行ってください。
            結果は指定されたJSON形式のみを data/review_result.json に書き込んでください。
            JSONのみを出力し、他のテキストは含めないでください。

      # Phase 3: Apply review results to strategy notes and screening weights
      - name: Apply review results
        run: python -m src.main apply-review

      # Phase 4: Commit updated strategy files back to repo
      - name: Save strategy updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/strategy_notes.json data/screening_weights.json data/predictions_history.json
          git diff --cached --quiet || git commit -m "Weekly strategy review: update notes and screening weights [skip ci]"
          git push
