name: Weekly Strategy Review

on:
  schedule:
    # Every Saturday 10:00 JST = 01:00 UTC Saturday
    - cron: '0 1 * * 6'
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  # strategy_governor の weight 変更 verify issue 作成に必要
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: stock_analyzer
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen

      # Phase 1: Build review prompt from prediction history
      - name: Prepare review data
        run: uv run python -m stock_analyzer.main review

      # Phase 2: Claude analyzes past performance and generates strategy updates
      - name: Strategy review with Claude AI
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Read,Write,Edit,Bash"'
          prompt: |
            まず stock_analyzer/data/investment_rules.json を読んで投資ルールを把握してください。
            次に stock_analyzer/data/review_prompt.txt を読んで、その内容に従い戦略レビューを行ってください。
            投資ルールとの整合性も確認し、必要ならルールの改善提案も含めてください。
            結果は指定されたJSON形式のみを stock_analyzer/data/review_result.json に書き込んでください。
            JSONのみを出力し、他のテキストは含めないでください。

      # Phase 3: Apply review results to strategy notes and screening weights
      # GH_TOKEN: governor 適用時の pending-verify issue 自動作成用
      - name: Apply review results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python -m stock_analyzer.main apply-review

      # Phase 4: Commit updated strategy files back to repo
      - name: Save strategy updates
        id: save_data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          # governor 成果物 (監査ログ / proposal / snapshot / verify YAML) も
          # 必ず commit — runner 上に置き去りにすると検証ループが回らない。
          git add -f data/strategy_notes.json data/screening_weights.json data/predictions_history.json \
            data/strategy_change_log.json data/strategy_change_proposals.json \
            data/proposed_screening_weights.json 2>/dev/null || true
          git add ../verify/stock_analyzer/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly strategy review: update notes and screening weights [skip ci]"
            if ! git push; then
              echo "::error::Git push failed - strategy data will be lost!"
              exit 1
            fi
          fi
