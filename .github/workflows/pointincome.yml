name: pointincome

# ポイントインカム click-coin email automation. Daily cron at JST 8:15 AM
# (15 min offset from moppy.yml so the two sites' traffic is staggered
# and looks less bot-y to anti-fraud systems). Mode follows the same
# vars.POINTINCOME_CRON_MODE pattern as Moppy: 'click' enables credited
# auto-click, anything else (including unset) keeps cron in extract-
# links mode.
#
# Until POINTINCOME_COOKIES is registered the click path will abort
# fast — by design — so a half-configured deployment doesn't silently
# generate uncredited HTTP traffic.

on:
  schedule:
    - cron: "15 23 * * *"  # JST 8:15 (15 min after moppy.yml)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "extract candidates only, redacted"
        type: boolean
        default: false
      extract_links:
        description: "post full clickable URLs to Slack instead of clicking"
        type: boolean
        default: false
      discover:
        description: "read-only recon of 毎日貯める section"
        type: boolean
        default: false
      inspect_url:
        description: "GET this URL with auth and dump body to log"
        type: string
        default: ""
      inspect_browser:
        description: "render inspect_url via Playwright Chromium so JS-driven content is visible"
        type: boolean
        default: false
      force_fresh_cookies:
        description: "delete persisted cookie jar before run, forcing re-bootstrap from Secret (use after rotating <SITE>_COOKIES)"
        type: boolean
        default: false


permissions:
  contents: read

jobs:
  run:
    uses: ./.github/workflows/_site-runner.yml
    with:
      site: pointincome
      cron_mode: ${{ vars.POINTINCOME_CRON_MODE }}
      dry_run: ${{ inputs.dry_run == true }}
      extract_links: ${{ inputs.extract_links == true }}
      discover: ${{ inputs.discover == true }}
      inspect_url: ${{ inputs.inspect_url }}
      inspect_browser: ${{ inputs.inspect_browser == true }}
      force_fresh_cookies: ${{ inputs.force_fresh_cookies == true }}
    secrets:
      slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_POINTINCOME }}
      cookies: ${{ secrets.POINTINCOME_COOKIES }}
      gmail_user: ${{ secrets.GMAIL_USER }}
      gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
