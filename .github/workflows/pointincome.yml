name: pointincome

# ポイントインカム click-coin email automation — **extract-only mode**.
#
# 2026-05-15 audit で pointincome が server-side JP IP geofence を導入してる
# ことが判明 (`/my/my_page.php` → `/information.php` redirect)。US ベースの
# GitHub Actions runner から click tracker を叩いても silently credit 拒否
# されるため、auto-click 不可。
#
# Gmail discovery 自体は IMAP で地域非依存に動くので、cron は
# **extract-links モード固定** で運用: Gmail から click URL を抽出して
# Slack に POST するだけで、ボットは click しない。user が JP IP (スマホ
# 等) から手動で URL を踏むと加算成立する。
#
# Slack 配信成功後に該当メールは `pointincome-clicked` ラベル付与され、
# 翌日以降の cron で重複 POST されない。
#
# JP IP を確保できた場合 (self-hosted JP runner / JP VPS) は extract_links
# のハードコードを外して通常 click モードに戻す。

on:
  # schedule disabled 2026-05-17 — Gmail account suspended, Zoho 移行待ち
  # schedule:
  #   - cron: "15 23 * * *"  # JST 8:15 (15 min after moppy.yml)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "extract candidates only, redacted"
        type: boolean
        default: false
      extract_links:
        description: "post full clickable URLs to Slack instead of clicking"
        type: boolean
        default: false
      discover:
        description: "read-only recon of 毎日貯める section"
        type: boolean
        default: false
      inspect_url:
        description: "GET this URL with auth and dump body to log"
        type: string
        default: ""
      inspect_browser:
        description: "render inspect_url via Playwright Chromium so JS-driven content is visible"
        type: boolean
        default: false
      inspect_cap:
        description: "max stripped-body bytes to print (default 80000)"
        type: string
        default: "80000"
      inspect_wait_selector:
        description: "browser mode only: wait for this CSS selector before reading page.content()"
        type: string
        default: ""
      inspect_anonymous:
        description: "skip cookie loading and login verification (login form inspect)"
        type: boolean
        default: false
      inspect_capture_network:
        description: "browser mode only: log all network requests (for SPA API discovery)"
        type: boolean
        default: false
      force_fresh_cookies:
        description: "delete persisted cookie jar before run, forcing re-bootstrap from Secret (use after rotating <SITE>_COOKIES)"
        type: boolean
        default: false
      force_password_login_test:
        description: "DEBUG: skip cookie verify, exercise password_login fallback directly"
        type: boolean
        default: false


permissions:
  contents: read

jobs:
  run:
    uses: ./.github/workflows/_site-runner.yml
    with:
      site: pointincome
      dry_run: ${{ inputs.dry_run == true }}
      # JP geofence forces extract-only mode — bot never clicks pointincome
      # URLs, only surfaces them to Slack for the user to click manually
      # from a JP IP. ``inputs.extract_links`` is ignored when fired by
      # ``workflow_dispatch`` so cron + dispatch behave identically.
      extract_links: true
      discover: ${{ inputs.discover == true }}
      inspect_url: ${{ inputs.inspect_url }}
      inspect_browser: ${{ inputs.inspect_browser == true }}
      inspect_cap: ${{ inputs.inspect_cap }}
      inspect_wait_selector: ${{ inputs.inspect_wait_selector }}
      inspect_anonymous: ${{ inputs.inspect_anonymous == true }}
      inspect_capture_network: ${{ inputs.inspect_capture_network == true }}
      force_fresh_cookies: ${{ inputs.force_fresh_cookies == true }}
      force_password_login_test: ${{ inputs.force_password_login_test == true }}
    secrets:
      slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_POINTINCOME }}
      cookies: ${{ secrets.POINTINCOME_COOKIES }}
      gmail_client_id: ${{ secrets.GMAIL_CLIENT_ID }}
      gmail_client_secret: ${{ secrets.GMAIL_CLIENT_SECRET }}
      gmail_refresh_token: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      login_user: ${{ secrets.POINTINCOME_USER }}
      login_pass: ${{ secrets.POINTINCOME_PASS }}
