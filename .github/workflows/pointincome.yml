name: pointincome

# ポイントインカム click-coin email automation.
#
# **無効化 (2026-05-15)**: pointincome は server-side で JP IP geofence を
# 導入しており、US ベースの GitHub Actions runner から mypage を開くと
# /information.php (地域ブロック) に redirect される。balance scrape は
# 取れず、click tracker も同じ edge で silently credit 拒否される
# 可能性が高い (HTTP 200 だが 0pt 加算)。
#
# JP IP を確保する手段 (self-hosted JP runner / JP VPS proxy / residential
# proxy) は技術的には可能だが、本サイト 1 つに月数百円+メンテ負担は
# 割に合わない。親会社 (セレス) は moppy と共通なので分散価値も薄く、
# 一旦 cron 無効化 + 観察モードへ。復活は JP IP 確保時に再評価。
#
# workflow_dispatch のみ残しているので、ローカル JP IP からの手動検証
# (将来再有効化判断時) は可能。

on:
  # schedule disabled — JP geofence breaks both balance scrape and likely
  # click crediting from US runners. Re-enable when JP IP available.
  # - cron: "15 23 * * *"  # JST 8:15 (15 min after moppy.yml)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "extract candidates only, redacted"
        type: boolean
        default: false
      extract_links:
        description: "post full clickable URLs to Slack instead of clicking"
        type: boolean
        default: false
      discover:
        description: "read-only recon of 毎日貯める section"
        type: boolean
        default: false
      inspect_url:
        description: "GET this URL with auth and dump body to log"
        type: string
        default: ""
      inspect_browser:
        description: "render inspect_url via Playwright Chromium so JS-driven content is visible"
        type: boolean
        default: false
      inspect_cap:
        description: "max stripped-body bytes to print (default 80000)"
        type: string
        default: "80000"
      force_fresh_cookies:
        description: "delete persisted cookie jar before run, forcing re-bootstrap from Secret (use after rotating <SITE>_COOKIES)"
        type: boolean
        default: false


permissions:
  contents: read

jobs:
  run:
    uses: ./.github/workflows/_site-runner.yml
    with:
      site: pointincome
      dry_run: ${{ inputs.dry_run == true }}
      extract_links: ${{ inputs.extract_links == true }}
      discover: ${{ inputs.discover == true }}
      inspect_url: ${{ inputs.inspect_url }}
      inspect_browser: ${{ inputs.inspect_browser == true }}
      inspect_cap: ${{ inputs.inspect_cap }}
      force_fresh_cookies: ${{ inputs.force_fresh_cookies == true }}
    secrets:
      slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_POINTINCOME }}
      cookies: ${{ secrets.POINTINCOME_COOKIES }}
      gmail_user: ${{ secrets.GMAIL_USER }}
      gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
