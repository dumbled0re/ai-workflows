name: warau

# ワラウ (https://www.warau.jp) on-site Webメール click-coin automation.
# Daily cron at JST 10:15 — 15-min staggered after fruitmail.yml.
#
# Cron will fail fast (verify_login redirect → exit code 2) until both
# WARAU_COOKIES and SLACK_CHANNEL_WARAU are registered. After registration:
#   1. ``gh workflow run warau.yml -f discover=true`` で `/mail/list` 構造確認
#   2. ``-f inspect_url=https://www.warau.jp/mail/list`` で inbox HTML を見て
#      `_MESSAGE_LINK_RE` (parser.py) を実 link pattern に narrow
#   3. 1 通目を inspect (``-f inspect_url=<message URL>``) で click-coin URL
#      pattern を確定 → `_CLICK_COIN_URL_RE` を refine
#   4. ``-f extract_links=true`` で実 candidate を Slack で目視、ad-fraud
#      path が混ざってないか EXCLUSION_URL_RE 強化

on:
  schedule:
    - cron: "30 9 * * *"  # JST 18:30 (Gmail 5 サイト分散の夕方枠)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "extract candidates only, redacted"
        type: boolean
        default: false
      extract_links:
        description: "post full clickable URLs to Slack instead of clicking"
        type: boolean
        default: false
      discover:
        description: "read-only recon of 毎日貯める section"
        type: boolean
        default: false
      inspect_url:
        description: "GET this URL with auth and dump body to log"
        type: string
        default: ""
      inspect_browser:
        description: "render inspect_url via Playwright Chromium so JS-driven content is visible"
        type: boolean
        default: false
      inspect_cap:
        description: "max stripped-body bytes to print (default 80000)"
        type: string
        default: "80000"
      inspect_wait_selector:
        description: "browser mode only: wait for this CSS selector before reading page.content()"
        type: string
        default: ""
      inspect_anonymous:
        description: "skip cookie loading and login verification (login form inspect)"
        type: boolean
        default: false
      inspect_capture_network:
        description: "browser mode only: log all network requests (for SPA API discovery)"
        type: boolean
        default: false
      inspect_wait_until:
        description: "browser mode only: page.goto wait condition (default networkidle; use domcontentloaded for ad-heavy pages that hang)"
        type: string
        default: ""
      force_fresh_cookies:
        description: "delete persisted cookie jar before run, forcing re-bootstrap from Secret (use after rotating <SITE>_COOKIES)"
        type: boolean
        default: false
      force_password_login_test:
        description: "DEBUG: skip cookie verify, exercise password_login fallback directly"
        type: boolean
        default: false


permissions:
  contents: read

jobs:
  run:
    uses: ./.github/workflows/_site-runner.yml
    with:
      site: warau
      dry_run: ${{ inputs.dry_run == true }}
      extract_links: ${{ inputs.extract_links == true }}
      discover: ${{ inputs.discover == true }}
      inspect_url: ${{ inputs.inspect_url }}
      inspect_browser: ${{ inputs.inspect_browser == true }}
      inspect_cap: ${{ inputs.inspect_cap }}
      inspect_wait_selector: ${{ inputs.inspect_wait_selector }}
      inspect_anonymous: ${{ inputs.inspect_anonymous == true }}
      inspect_capture_network: ${{ inputs.inspect_capture_network == true }}
      inspect_wait_until: ${{ inputs.inspect_wait_until }}
      force_fresh_cookies: ${{ inputs.force_fresh_cookies == true }}
      force_password_login_test: ${{ inputs.force_password_login_test == true }}
    secrets:
      slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_WARAU }}
      cookies: ${{ secrets.WARAU_COOKIES }}
      gmail_client_id: ${{ secrets.GMAIL_CLIENT_ID }}
      gmail_client_secret: ${{ secrets.GMAIL_CLIENT_SECRET }}
      gmail_refresh_token: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      login_user: ${{ secrets.WARAU_USER }}
      login_pass: ${{ secrets.WARAU_PASS }}
