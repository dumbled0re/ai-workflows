name: amefuri

# アメフリ daily-bonus endpoint poll. Daily cron at JST 9:15 AM (offset
# from moppy 8:00 / pointincome 8:15 / hapitas 8:30 / chobirich 8:45 /
# gendama 9:00 so per-IP traffic is spread across an hour rather than a
# minute). Cron always runs in click (credited) mode using
# AMEFURI_COOKIES; verify_login aborts fast if cookies are missing or
# stale.

on:
  schedule:
    - cron: "15 0 * * *"  # JST 9:15
  workflow_dispatch:
    inputs:
      dry_run:
        description: "extract candidates only, redacted"
        type: boolean
        default: false
      extract_links:
        description: "post full clickable URLs to Slack instead of clicking"
        type: boolean
        default: false
      discover:
        description: "read-only recon of mypage / top page (use to find real bonus URL)"
        type: boolean
        default: false
      inspect_url:
        description: "GET this URL with auth and dump body to log"
        type: string
        default: ""
      inspect_browser:
        description: "render inspect_url via Playwright Chromium so JS-driven content is visible"
        type: boolean
        default: false
      inspect_cap:
        description: "max stripped-body bytes to print (default 80000)"
        type: string
        default: "80000"
      inspect_wait_selector:
        description: "browser mode only: wait for this CSS selector before reading page.content()"
        type: string
        default: ""
      inspect_anonymous:
        description: "skip cookie loading and login verification (login form inspect)"
        type: boolean
        default: false
      force_fresh_cookies:
        description: "delete persisted cookie jar before run, forcing re-bootstrap from Secret (use after rotating <SITE>_COOKIES)"
        type: boolean
        default: false


permissions:
  contents: read

jobs:
  run:
    uses: ./.github/workflows/_site-runner.yml
    with:
      site: amefuri
      dry_run: ${{ inputs.dry_run == true }}
      extract_links: ${{ inputs.extract_links == true }}
      discover: ${{ inputs.discover == true }}
      inspect_url: ${{ inputs.inspect_url }}
      inspect_browser: ${{ inputs.inspect_browser == true }}
      inspect_cap: ${{ inputs.inspect_cap }}
      inspect_wait_selector: ${{ inputs.inspect_wait_selector }}
      inspect_anonymous: ${{ inputs.inspect_anonymous == true }}
      force_fresh_cookies: ${{ inputs.force_fresh_cookies == true }}
    secrets:
      slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
      slack_channel: ${{ secrets.SLACK_CHANNEL_AMEFURI }}
      cookies: ${{ secrets.AMEFURI_COOKIES }}
      gmail_user: ${{ secrets.GMAIL_USER }}
      gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
      login_user: ${{ secrets.AMEFURI_USER }}
      login_pass: ${{ secrets.AMEFURI_PASS }}
