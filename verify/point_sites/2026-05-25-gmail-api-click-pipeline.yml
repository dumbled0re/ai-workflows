verify_after: 2026-05-25T22:00:00+09:00
project: point_sites
relates_to: "5130431 (cron 分散) + db57d40 (Gmail API 移行)"
description: |
  2026-05-22 に Gmail API 移行 + cron 時刻分散 (07:30/11:30/15:00/18:30/21:30 JST)
  + readonly scope (server-side label/既読化なし、local dedup に切替) を投入。

  user 視点で Gmail UI 上 「メールが click されてない / 何もしてないように見える」
  状態 (readonly scope の設計通り) が続くため、cron が実際に click pipeline を
  回しているかは Gmail UI からは判断不可。

  本日 (2026-05-22) の moppy 朝 cron は ``found 0 candidate batches``で終わったが、
  これは extract_links=true テストで今日分の候補メールを dedup に乗せたため
  (= 仕様通りの skip)。本物の検証は **新着メールが入る翌日以降の cron が
  非ゼロ candidate を拾うか** で行う。

  ``recent_run_log_grep`` で 5 サイト (moppy/hapitas/fruitmail/warau/sugutama) の
  直近 3 回の scheduled run のいずれかに ``found [1-9]`` (= 1 件以上 candidate
  検出) が出ているかを check。3 日経って 1 度も非ゼロ候補が来ないなら、
  dedup 永続化 or query mismatch or Gmail 側で mail 届いていない、のどれかが
  疑わしい。
kind: recent_run_log_grep
args:
  workflows:
    - moppy.yml
    - hapitas.yml
    - fruitmail.yml
    - warau.yml
    - sugutama.yml
  pattern: "found [1-9]\\d* candidate batches"
  lookback: 3
  require_all: false
max_attempts: 5
retry_after_hours: 24
success_message: |
  ✅ Gmail API click pipeline 動作確認 — いずれかのサイトで candidate 検出 + click 試行確認
