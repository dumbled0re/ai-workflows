verify_id: point_sites/2026-05-18-new-sites-mail
verify_after: 2026-05-18T11:00:00+09:00
project: point_sites
relates_to: "57588e1 a19eaf2 d14ad29"
description: |
  fruitmail / warau / sugutama の 3 新サイトで click-mail が到着し candidate
  が 1 件以上 found されたかを passive 検証する。``recent_run_log_grep`` で
  各サイトの直近 10 cron run を scan、3 サイト全部で ``found N`` N>=1 を見つ
  けたら success → 自動 close。

  ``require_all: true`` なので 3 サイト全部が必要。例えば fruitmail だけ
  yield してて warau/sugutama が 0 のままなら inconclusive 継続 → user が
  気付く合図 (Gmail filter / 配信 ON 確認)。一部だけ yield のまま 1 週間
  続いたら user 側問題なので個別調査。
kind: recent_run_log_grep
args:
  workflows:
    - fruitmail.yml
    - warau.yml
    - sugutama.yml
  pattern: "found [1-9]\\d* candidate batches"
  lookback: 10
  require_all: true
max_attempts: 30
retry_after_hours: 24
success_message: |
  ✅ fruitmail / warau / sugutama すべてで click-mail を受信・処理確認
