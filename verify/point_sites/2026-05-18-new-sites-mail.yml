description: |
  fruitmail / warau / sugutama の 3 新サイトで click-mail が到着し、
  candidate が 1 件以上 found されたか確認。3 日経っても全部 0 candidates
  なら登録設定 or Gmail filter の問題の可能性あり要 user 確認。

  自動化困難 (3 サイト分の cron run を順に grep する必要) なので
  manual flag。
kind: manual
args:
  instructions: |
    各サイトの最新 run log を見て "found N candidate batches" の N を確認:
      gh run list -w fruitmail.yml -L 1 --json databaseId -q '.[0].databaseId' \
        | xargs -I{} gh run view {} --log | grep "found.*candidate"
      gh run list -w warau.yml -L 1 ...
      gh run list -w sugutama.yml -L 1 ...
    3 日経って全部 0 のままなら user に「3 サイト登録した Gmail アドレスが
    正しいか」「メール配信設定で配信 ON か」確認。
max_attempts: 1
