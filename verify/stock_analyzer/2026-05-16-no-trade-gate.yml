  - compute_recent_up_hit_rate が data 上で正しく動いてる
  - phase_prepare が新しい directive を prompt に injection してる
  - AI 側は次の cron 以降 prediction=NO_TRADE を holdings に出し始める
    (これは log には出ない、Slack 出力で観察)

