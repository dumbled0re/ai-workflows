  ので、recent_run_log_grep で次の朝 (5/16 07:30 JST 以降) の
  cron 結果を passive 確認する。

  inconclusive (= gate fired but log line not yet present) 時は次の
  pending-verify cron で retry。max_attempts=3 で 3 日観察。それでも
  発火が見えない場合は実装バグの可能性が高く、Slack に hard failure
  通知される。
