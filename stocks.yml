# 保有銘柄設定ファイル
# ticker: Yahoo Finance形式（日本株は末尾に.Tを付ける）
# name: 銘柄名（日本語可）
# shares: 保有株数
# avg_cost: 平均取得単価（省略可）

holdings:
  - ticker: "7203.T"
    name: "トヨタ自動車"
    shares: 100
    avg_cost: 2500
  - ticker: "6758.T"
    name: "ソニーグループ"
    shares: 50
  - ticker: "9984.T"
    name: "ソフトバンクグループ"
    shares: 200

settings:
  history_days: 90          # 取得する過去データの日数
  discovery_top_n: 5        # おすすめ銘柄の表示数
  screener_pool_size: 50    # スクリーニングで絞り込む候補数
  claude_model: "claude-sonnet-4-5-20250929"
